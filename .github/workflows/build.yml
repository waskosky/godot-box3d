name: Desktop Builds

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
          - os: windows-2022
            platform: windows
            arch: x86_64
          - os: macos-14
            platform: macos
            arch: universal

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Set up pinned SCons
        shell: bash
        run: scripts/setup_python_build_env.sh

      - name: Bootstrap pinned dependencies
        shell: bash
        run: scripts/bootstrap_dependencies.sh

      - name: Build debug and release
        shell: bash
        run: |
          source scripts/_common.sh
          scons_bin="$(scons_command)"
          "$scons_bin" -j 4 platform=${{ matrix.platform }} target=template_debug arch=${{ matrix.arch }}
          "$scons_bin" -j 4 platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }}

      - name: Upload desktop binaries
        uses: actions/upload-artifact@v7
        with:
          name: godot-box3d-${{ matrix.platform }}-${{ matrix.arch }}
          path: bin/${{ matrix.platform }}/*
          if-no-files-found: error
